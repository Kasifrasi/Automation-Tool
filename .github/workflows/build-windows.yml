name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Caching beschleunigt zukünftige Builds enorm
      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build GUI
        # Baut nur die GUI-Anwendung im Release-Modus
        run: cargo build --release -p gui

      # Lädt die fertige .exe Datei hoch, damit du sie herunterladen kannst
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: target/release/gui.exe
          if-no-files-found: error

      # Erstellt automatisch ein GitHub Release und lädt die .exe hoch
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/gui.exe
