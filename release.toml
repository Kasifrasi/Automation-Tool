# Nicht auf crates.io publishen – nur Tag + Push für GitHub Actions
publish = false

# Tag-Format passend zum GitHub Workflow (erwartet "v*")
tag-name = "v{{version}}"

# Alles in einem Commit zusammenfassen
consolidate-commits = true

# Release-Commit nicht als CI-Build triggern (nur der Tag-Push triggert den Workflow)
pre-release-commit-message = "chore: Release v{{version}} [skip ci]"